<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POT ROCKET SF — Premium Domain For Sale</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Rajdhani:wght@500;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #02040a;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Cosmic Space Nebula & Starfield Background */
        .space-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 60% 40%, rgba(0, 242, 254, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 30% 70%, rgba(59, 130, 246, 0.12) 0%, transparent 40%),
                #02040a;
            background-size: cover;
            z-index: 1;
        }

        .space-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.15) 1.5px, transparent 35px),
                radial-gradient(white, rgba(255,255,255,.1) 1px, transparent 25px);
            background-size: 450px 450px, 300px 300px;
            background-position: 0 0, 50px 50px;
            opacity: 0.4;
        }

        /* Space Novel Book Cover Framing */
        .book-frame {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            height: 680px;
            margin: 20px;
            padding: 3rem 2.5rem;
            background: rgba(3, 7, 18, 0.88);
            border: 2px solid rgba(0, 242, 254, 0.25);
            box-shadow: 
                0 0 50px rgba(0, 0, 0, 0.9),
                inset 0 0 35px rgba(0, 242, 254, 0.08),
                0 0 25px rgba(0, 242, 254, 0.12);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(12px);
        }

        /* Cyberpunk Corner Details */
        .corner {
            position: absolute;
            width: 14px;
            height: 14px;
            border: 2px solid #3b82f6;
            z-index: 3;
        }
        .top-left { top: 12px; left: 12px; border-right: none; border-bottom: none; }
        .top-right { top: 12px; right: 12px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: 12px; left: 12px; border-right: none; border-top: none; }
        .bottom-right { bottom: 12px; right: 12px; border-left: none; border-top: none; }

        .novel-header {
            font-family: 'Orbitron', sans-serif;
            font-weight: 500;
            font-size: 0.75rem;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: #3b82f6;
            text-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }

        /* Graphic Container matching image angle */
        .graphic-container {
            margin: 1rem 0;
            position: relative;
        }

        .novel-graphic {
            width: 120px;
            height: 120px;
            fill: none;
            stroke: #00f2fe;
            filter: drop-shadow(0 0 10px #00f2fe) drop-shadow(0 0 20px #3b82f6);
            /* Angles the ship dynamically upward and right */
            transform: rotate(35deg); 
            animation: cruise 4s ease-in-out infinite alternate;
        }

        @keyframes cruise {
            0% { transform: rotate(32deg) translate(-2px, 2px); }
            100% { transform: rotate(38deg) translate(2px, -2px); }
        }

        /* Electric Blue Neon Title Typography */
        .title-group {
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.6rem;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #00f2fe;
            text-shadow: 0 0 12px rgba(0, 242, 254, 0.7), 0 0 2px rgba(0, 242, 254, 0.9);
        }

        .title-sub {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.6rem;
            line-height: 1.1;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #00f2fe;
            text-shadow: 0 0 12px rgba(0, 242, 254, 0.7), 0 0 2px rgba(0, 242, 254, 0.9);
            margin-bottom: 0.2rem;
        }

        .title-location {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 2.9rem;
            line-height: 1;
            text-transform: uppercase;
            color: #3b82f6;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.8), 0 0 2px #ffffff;
            letter-spacing: 0.08em;
        }

        .domain-ext {
            font-size: 1.4rem;
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
            vertical-align: super;
            font-weight: 500;
        }

        .synopsis {
            color: #a3aed0;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-top: 1.2rem;
            max-width: 340px;
            letter-spacing: 0.03em;
        }

        /* Action Buttons */
        .cover-footer {
            width: 100%;
            margin-top: auto;
        }

        .btn-acquire {
            display: block;
            width: 100%;
            background: transparent;
            color: #ffffff;
            border: 2px solid #00f2fe;
            font-family: 'Orbitron', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 1.1rem;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .btn-acquire:hover {
            background: #00f2fe;
            color: #02040a;
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.7);
            transform: translateY(-2px);
        }

        .escrow-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #4b5563;
            margin-top: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="space-bg"></div>

    <div class="book-frame">
        <div class="corner top-left"></div>
        <div class="corner top-right"></div>
        <div class="corner bottom-left"></div>
        <div class="corner bottom-right"></div>

        <div class="novel-header">Premium Industry Asset</div>

        <div class="graphic-container">
            <!-- Custom Vector Graphic: Sleek Rocket Body integrated with Botanical Leaf fins -->
            <svg class="novel-graphic" viewBox="0 0 24 24" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <!-- Main Rocket Fuselage -->
                <path d="M12 2s4 3 4 9c0 2-.5 3.5-1.5 4.5M12 2s-4 3-4 9c0 2 .5 3.5 1.5 4.5" />
                <!-- Cockpit Window Detail -->
                <path d="M12 5a1.5 1.5 0 0 1 1.5 1.5v1A1.5 1.5 0 0 1 12 9a1.5 1.5 0 0 1-1.5-1.5v-1A1.5 1.5 0 0 1 12 5z" />
                <!-- Leaf Outlines acting as Propulsion Wings -->
                <path d="M8 11c-2-1-4 0-5 2 1.5.5 3 0 4-1M16 11c2-1 4 0 5 2-1.5.5-3 0-4-1" />
                <path d="M9.5 13.5c-1.5-1-3 .5-3.5 2 1 .5 2-.5 2.5-1.5M14.5 13.5c1.5-1 3 .5 3.5 2-1 .5-2-.5-2.5-1.5" />
                <!-- Exhaust/Flame Base -->
                <path d="M10 15.5l2 3.5 2-3.5" />
                <path d="M12 19v3M10 19.5v2M14 19.5v2" />
            </svg>
        </div>

        <div class="title-group">
            <h1>Pot</h1>
            <div class="title-sub">Rocket</div>
            <div class="title-location">SF<span class="domain-ext">.com</span></div>
            <p class="synopsis">The ultimate, high-velocity brand identity for a premium Northern California cannabis delivery, logistics, or retail enterprise. Available for immediate acquisition.</p>
        </div>

        <div class="cover-footer">
            <!-- REPLACE THE '#' BELOW WITH YOUR AFTERNIC OR SEDO BUY LINK -->
            <a href="#" class="btn-acquire">Acquire Brand</a>
            <div class="escrow-tag">Secure Industry Escrow Transfer</div>
        </div>
    </div>

</body>
</html>
